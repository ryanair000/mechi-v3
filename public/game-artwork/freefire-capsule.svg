    <path d="M520 120 L840 220 L720 560 L430 470 Z" fill="url(#accent-freefire-c)" opacity="0.14"/>
    <path d="M120 760 L760 570 L850 1090 L250 1160 Z" fill="url(#accent-freefire-c)" opacity="0.12"/>
  </g>
  <g transform="translate(58 58)">
