<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--page-bg); font-family: var(--font-body); padding: 20px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; }
.swatch { flex: 1; min-width: 110px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border-color); }
.swatch-color { height: 72px; }
.swatch-info { padding: 10px 12px; background: var(--surface-strong); }
.swatch-name { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--text-primary); }
.swatch-hex { font-family: monospace; font-size: 10px; color: var(--text-soft); margin-top: 3px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="swatch-color" style="background:#32e0c4;"></div>
    <div class="swatch-info"><div class="swatch-name">Mechi Electric Teal</div><div class="swatch-hex">#32E0C4 — --brand-teal</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#ff6b6b;"></div>
    <div class="swatch-info"><div class="swatch-name">Competitive Coral</div><div class="swatch-hex">#FF6B6B — --brand-coral</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#0b1121;"></div>
    <div class="swatch-info"><div class="swatch-name">Night Slate</div><div class="swatch-hex">#0B1121 — --brand-night</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#ff8383;"></div>
    <div class="swatch-info"><div class="swatch-name">Coral Hover</div><div class="swatch-hex">#FF8383 — --accent-primary-hover</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#54e7d0;"></div>
    <div class="swatch-info"><div class="swatch-name">Teal Hover</div><div class="swatch-hex">#54E7D0 — --accent-secondary-hover</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#0b776b;"></div>
    <div class="swatch-info"><div class="swatch-name">Teal Text (light)</div><div class="swatch-hex">#0B776B — --accent-secondary-text</div></div>
  </div>
</div>
</body>
</html>
