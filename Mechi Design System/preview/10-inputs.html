<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--page-bg); padding: 20px; font-family: 'Open Sans', sans-serif; }
.row { display: flex; gap: 20px; flex-wrap: wrap; }
.col { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.label { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #94a0b2; }
.input { width: 100%; border: 1px solid rgba(11,17,33,0.08); border-radius: 1rem; padding: 10px 14px; font-family: 'Open Sans', sans-serif; font-size: 14px; color: #0b1121; background: #fff; box-shadow: inset 0 1px 0 rgba(255,255,255,0.3); outline: none; }
.input::placeholder { color: #94a0b2; }
.input-focus { border-color: rgba(50,224,196,0.36); box-shadow: 0 0 0 4px rgba(50,224,196,0.14); }
.input-error { border-color: rgba(239,68,68,0.36); box-shadow: 0 0 0 4px rgba(239,68,68,0.1); }
.hint { font-size: 11px; color: #94a0b2; }
.hint-err { font-size: 11px; color: #ef4444; }
</style>
</head>
<body>
<div class="row">
  <div class="col">
    <div class="field">
      <div class="label">Username</div>
      <input class="input" placeholder="e.g. ProGamer_KE" value="">
      <div class="hint">Your Mechi display name</div>
    </div>
    <div class="field">
      <div class="label">Game ID (focused)</div>
      <input class="input input-focus" placeholder="Enter your in-game ID" value="KE_Striker99">
    </div>
  </div>
  <div class="col">
    <div class="field">
      <div class="label">WhatsApp Number (error)</div>
      <input class="input input-error" placeholder="+254 7XX XXX XXX" value="+254">
      <div class="hint-err">Please enter a valid Kenyan phone number</div>
    </div>
    <div class="field">
      <div class="label">Region</div>
      <input class="input" placeholder="Select region" value="East Africa">
    </div>
  </div>
</div>
</body>
</html>
