      - name: Validate E2E environment
        shell: bash
        run: |
          missing=()
          for key in E2E_SUPABASE_URL E2E_SUPABASE_SERVICE_ROLE_KEY NEXT_PUBLIC_SUPABASE_ANON_KEY JWT_SECRET CRON_SECRET; do
            if [ -z "${!key}" ]; then
