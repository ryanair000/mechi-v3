<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8edf4; padding: 20px; display: flex; gap: 12px; }
.sidebar { width: 200px; background: linear-gradient(180deg,#fff,rgba(255,255,255,0.82)); border: 1px solid rgba(11,17,33,0.08); border-radius: 1.7rem; padding: 10px; box-shadow: 0 18px 40px rgba(15,23,42,0.06); flex-shrink: 0; backdrop-filter: blur(18px); display: flex; flex-direction: column; gap: 4px; }
.logo-row { display: flex; align-items: center; gap: 8px; border: 1px solid rgba(11,17,33,0.08); border-radius: 1.35rem; padding: 8px 12px; margin-bottom: 6px; background: #fff; box-shadow: 0 18px 40px rgba(15,23,42,0.06); }
.logo-mark { width: 28px; height: 28px; background: #0b1121; border-radius: 8px; }
.logo-text { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #0b1121; }
.section-label { font-family: 'Montserrat', sans-serif; font-size: 8px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: #94a0b2; padding: 6px 10px 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 14px; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600; color: #607086; border: 1px solid transparent; cursor: pointer; transition: all 160ms ease; }
.nav-item.active { border-color: rgba(50,224,196,0.22); background: #fdfefe; color: #0b1121; box-shadow: 0 16px 28px rgba(50,224,196,0.12); }
.nav-icon { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
.nav-icon.teal { background: #32e0c4; }
.nav-icon.gray { background: #e2e8f0; }
.divider { margin: 6px 0; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo-row">
    <div class="logo-mark"></div>
    <div class="logo-text">Mechi</div>
  </div>
  <div class="nav-item active"><div class="nav-icon teal"></div>Dashboard</div>
  <div class="nav-item"><div class="nav-icon gray"></div>Tutorials</div>
  <div class="nav-item"><div class="nav-icon gray"></div>Leaderboard</div>
  <div class="section-label">Compete</div>
  <div class="nav-item"><div class="nav-icon gray"></div>Tournaments</div>
  <div class="nav-item"><div class="nav-icon gray"></div>Lobbies</div>
  <div class="nav-item"><div class="nav-icon gray"></div>Challenges</div>
  <div class="section-label">Games</div>
  <div class="nav-item"><div class="nav-icon gray"></div>Games</div>
  <div class="nav-item"><div class="nav-icon gray"></div>Suggest</div>
</div>
</body>
</html>
