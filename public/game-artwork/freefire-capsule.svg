    <rect x="0" y="0" width="170" height="40" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.18)"/>
    <text x="85" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="2">LOBBY</text>
