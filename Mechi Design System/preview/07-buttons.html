<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1121;padding:24px;font-family:'Montserrat',sans-serif;}
.wrap{border:1px solid rgba(226,232,240,0.09);border-radius:6px;overflow:hidden;}
/* Section headers */
.section{padding:10px 18px;border-bottom:1px solid rgba(226,232,240,0.09);
  font-size:8px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#7b879a;background:#0e1625;}
/* Button row */
.btn-row{display:flex;gap:10px;padding:16px 18px;border-bottom:1px solid rgba(226,232,240,0.09);align-items:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px;padding:0 18px;
  font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;cursor:pointer;border-radius:5px;border:1px solid transparent;letter-spacing:0.02em;}
.btn-primary{background:#ff6b6b;color:#0b1121;border-color:transparent;box-shadow:0 8px 20px rgba(255,107,107,0.28);}
.btn-teal{background:#32e0c4;color:#0b1121;border-color:transparent;box-shadow:0 8px 20px rgba(50,224,196,0.22);}
.btn-ghost{background:rgba(50,224,196,0.10);color:#8ef2e4;border-color:rgba(50,224,196,0.22);}
.btn-outline{background:#111b2e;color:#b9c4d2;border-color:rgba(226,232,240,0.09);}
.btn-danger{background:rgba(255,107,107,0.14);color:#ff8383;border-color:rgba(255,107,107,0.22);}
/* Small */
.sm{min-height:32px;padding:0 12px;font-size:11px;}
/* Disabled */
.dis{opacity:0.38;cursor:not-allowed;}
/* Loading */
.spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(11,17,33,0.3);border-top-color:#0b1121;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Icon placeholder */
.ico{width:12px;height:12px;border-radius:2px;background:currentColor;opacity:0.7;flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="section">Primary Actions — Full Size</div>
  <div class="btn-row">
    <button class="btn btn-primary"><span class="ico"></span> Find Match</button>
    <button class="btn btn-teal"><span class="ico"></span> Join Queue</button>
    <button class="btn btn-ghost"><span class="ico"></span> View Lobbies</button>
    <button class="btn btn-outline"><span class="ico"></span> Full Tutorial</button>
    <button class="btn btn-danger"><span class="ico"></span> Leave Match</button>
  </div>
  <div class="section">Small Variants</div>
  <div class="btn-row">
    <button class="btn btn-primary sm"><span class="ico"></span> Find Match</button>
    <button class="btn btn-teal sm"><span class="ico"></span> Join Queue</button>
    <button class="btn btn-ghost sm">View Lobbies</button>
    <button class="btn btn-outline sm">Settings</button>
    <button class="btn btn-danger sm">Remove</button>
  </div>
  <div class="section">States — Disabled · Loading · Active</div>
  <div class="btn-row">
    <button class="btn btn-primary dis" disabled>Find Match</button>
    <button class="btn btn-teal dis" disabled>Join Queue</button>
    <button class="btn btn-primary"><span class="spin"></span> Searching…</button>
    <button class="btn btn-ghost dis" disabled>View Lobbies</button>
    <button class="btn btn-outline" style="border-color:rgba(50,224,196,0.3);background:rgba(50,224,196,0.06);">Active / Hover</button>
  </div>
</div>
</body>
</html>
