<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="sf6-capsule-title sf6-capsule-desc">
  <title id="sf6-capsule-title">Street Fighter 6</title>
  <desc id="sf6-capsule-desc">Stylized Mechi capsule artwork for Street Fighter 6.</desc>
  <defs>
    <linearGradient id="bg-sf6-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#19140d"></stop>
      <stop offset="100%" stop-color="#493119"></stop>
    </linearGradient>
    <linearGradient id="accent-sf6-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8f4f"></stop>
      <stop offset="100%" stop-color="#ffe082"></stop>
    </linearGradient>
    <radialGradient id="glow-sf6-c" cx="72%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff8f4f" stop-opacity="0.34"></stop>
      <stop offset="100%" stop-color="#ff8f4f" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
  <rect width="900" height="1200" fill="url(#bg-sf6-c)"></rect>
  <rect width="900" height="1200" fill="url(#glow-sf6-c)"></rect>
  <g opacity="0.82">
    <circle cx="650" cy="260" r="180" fill="none" stroke="url(#accent-sf6-c)" stroke-width="6" opacity="0.62"></circle>
    <path d="M520 120 L840 220 L720 560 L430 470 Z" fill="url(#accent-sf6-c)" opacity="0.14"></path>
    <path d="M120 760 L760 570 L850 1090 L250 1160 Z" fill="url(#accent-sf6-c)" opacity="0.12"></path>
  </g>
  <g transform="translate(58 58)">
    <rect x="0" y="0" width="118" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"></rect>
    <text x="59" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="2">MECHI</text>
  </g>
  <g transform="translate(58 160)">
    <rect x="0" y="0" width="170" height="40" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.18)"></rect>
    <text x="85" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="2">RANKED</text>
  </g>
  <g transform="translate(58 808)">
    <rect x="0" y="0" width="784" height="254" rx="36" fill="rgba(8,12,18,0.44)" stroke="rgba(255,255,255,0.12)"></rect>
    <text x="42" y="72" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffe082" letter-spacing="3">CORNER PRESSURE</text>
    <text x="42" y="144" font-family="Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff">Street Fighter 6</text>
    <rect x="42" y="164" width="280" height="8" rx="4" fill="url(#accent-sf6-c)"></rect>
    <text x="42" y="214" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.72)">Queue-ready local artwork with no external dependency.</text>
  </g>
