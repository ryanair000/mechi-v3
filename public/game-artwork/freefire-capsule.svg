<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="freefire-capsule-title freefire-capsule-desc">
  <title id="freefire-capsule-title">Free Fire</title>
  <desc id="freefire-capsule-desc">Stylized Mechi capsule artwork for Free Fire.</desc>
  <defs>
    <linearGradient id="bg-freefire-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#19130f"/>
      <stop offset="100%" stop-color="#522718"/>
    </linearGradient>
    <linearGradient id="accent-freefire-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <radialGradient id="glow-freefire-c" cx="72%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff8a3d" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="1200" fill="url(#bg-freefire-c)"/>
