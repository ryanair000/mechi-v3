  e2e-admin:
    name: e2e-admin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
