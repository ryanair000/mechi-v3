<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mechi — Dashboard UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --teal:#32e0c4; --coral:#ff6b6b; --night:#0b1121;
  --bg:#0b1121; --bg-alt:#09101b;
  --surf:#111b2e; --surf-hi:#152033; --surf-lo:rgba(14,22,38,0.84);
  --txt:#f8fbfd; --txt2:#b9c4d2; --txt3:#7b879a;
  --bdr:rgba(226,232,240,0.09); --bdr2:rgba(226,232,240,0.16);
  --teal-text:#8ef2e4; --teal-soft:rgba(50,224,196,0.10); --teal-bdr:rgba(50,224,196,0.22);
  --coral-soft:rgba(255,107,107,0.14); --coral-bdr:rgba(255,107,107,0.22);
  --r:6px; /* base radius — keep it tight */
  --font-d:'Montserrat',sans-serif; --font-b:'Open Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font-b);overflow-x:hidden;}
body{
  background:
    radial-gradient(ellipse at 0% 0%,rgba(50,224,196,0.08),transparent 30%),
    radial-gradient(ellipse at 100% 0%,rgba(255,107,107,0.07),transparent 30%),
    var(--bg);
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(130,149,176,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(130,149,176,0.025) 1px,transparent 1px);
  background-size:64px 64px;mask-image:radial-gradient(ellipse at top,rgba(0,0,0,0.18),transparent 70%);opacity:1;}
#root{position:relative;z-index:1;height:100%;}
button{font-family:var(--font-d);cursor:pointer;transition:all 140ms ease;}
input{font-family:var(--font-b);}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:rgba(95,109,130,0.25);border-radius:3px;}
/* lucide icon reset */
[data-lucide]{display:block;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Icon ──────────────────────────────────────────────────────
function Icon({ name, size=16, sw=1.75, color, style }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', flexShrink:0, color:color||'currentColor', ...style }}>
      <i data-lucide={name} style={{ width:size, height:size, display:'block' }} />
    </span>
  );
}

// ── Palette ───────────────────────────────────────────────────
const P = {
  teal:'#32e0c4', coral:'#ff6b6b', night:'#0b1121',
  txt:'#f8fbfd', txt2:'#b9c4d2', txt3:'#7b879a',
  surf:'#111b2e', surfHi:'#152033',
  bdr:'rgba(226,232,240,0.09)', bdr2:'rgba(226,232,240,0.16)',
  tealTxt:'#8ef2e4', tealSoft:'rgba(50,224,196,0.10)', tealBdr:'rgba(50,224,196,0.22)',
  coralSoft:'rgba(255,107,107,0.14)', coralBdr:'rgba(255,107,107,0.22)',
};

// ── Card style (used inline) ──────────────────────────────────
const card = {
  background: P.surf,
  border: `1px solid ${P.bdr}`,
  borderRadius: 8,
};

// ── Chip ──────────────────────────────────────────────────────
function Chip({ children, c='teal' }) {
  const map = {
    teal: { bg:P.tealSoft, bdr:P.tealBdr, txt:P.tealTxt },
    coral:{ bg:P.coralSoft, bdr:P.coralBdr, txt:'#ffaaaa' },
    gray: { bg:'rgba(95,109,130,0.12)', bdr:P.bdr, txt:P.txt3 },
    blue: { bg:'rgba(96,165,250,0.12)', bdr:'rgba(96,165,250,0.2)', txt:'#93c5fd' },
  };
  const s = map[c]||map.teal;
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, border:`1px solid ${s.bdr}`,
    background:s.bg, color:s.txt, fontFamily:P.font_d, fontSize:9, fontWeight:700,
    letterSpacing:'0.1em', textTransform:'uppercase', padding:'2px 8px', borderRadius:4 }}>{children}</span>;
}

// ── Button ────────────────────────────────────────────────────
function Btn({ children, v='primary', onClick, style, sm }) {
  const h = sm ? 32 : 40;
  const px = sm ? 12 : 16;
  const fs = sm ? 11 : 13;
  const base = { display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6,
    fontFamily:P.font_d || "'Montserrat',sans-serif", fontWeight:700, border:'1px solid transparent',
    borderRadius:6, minHeight:h, padding:`0 ${px}px`, fontSize:fs, transition:'all 140ms ease',
    whiteSpace:'nowrap', cursor:'pointer' };
  const vs = {
    primary: { ...base, background:P.coral, color:P.night, borderColor:'transparent', boxShadow:'0 8px 20px rgba(255,107,107,0.22)' },
    teal:    { ...base, background:P.teal,  color:P.night, borderColor:'transparent', boxShadow:'0 8px 20px rgba(50,224,196,0.18)' },
    ghost:   { ...base, background:P.tealSoft, color:P.tealTxt, borderColor:P.tealBdr },
    outline: { ...base, background:P.surf, color:P.txt2, borderColor:P.bdr },
    danger:  { ...base, background:P.coralSoft, color:'#ff8383', borderColor:P.coralBdr },
  };
  return <button style={{ ...(vs[v]||vs.primary), ...style }} onClick={onClick}>{children}</button>;
}

// ── Avatar ────────────────────────────────────────────────────
function Av({ name='?', size=36 }) {
  return <div style={{ width:size, height:size, borderRadius:4, background:P.tealSoft,
    border:`1px solid ${P.tealBdr}`, display:'flex', alignItems:'center', justifyContent:'center',
    fontFamily:"'Montserrat',sans-serif", fontWeight:900, fontSize:size*0.38, color:P.tealTxt, flexShrink:0 }}>
    {name[0]?.toUpperCase()}
  </div>;
}

// ── Section label ─────────────────────────────────────────────
function SLabel({ children, style }) {
  return <p style={{ fontFamily:"'Montserrat',sans-serif", fontSize:10, fontWeight:800,
    letterSpacing:'0.14em', textTransform:'uppercase', color:P.tealTxt, marginBottom:10, ...style }}>{children}</p>;
}

// ── Divider ───────────────────────────────────────────────────
function Div() { return <div style={{ borderTop:`1px solid ${P.bdr}`, margin:'0' }} />; }

// ── Sidebar ───────────────────────────────────────────────────
const NAV = [
  { section:null, items:[
    { id:'dashboard',   label:'Dashboard',   icon:'LayoutDashboard' },
    { id:'tutorials',   label:'Tutorials',   icon:'CirclePlay' },
    { id:'leaderboard', label:'Leaderboard', icon:'Trophy' },
  ]},
  { section:'Compete', items:[
    { id:'tournaments', label:'Tournaments', icon:'Swords' },
    { id:'lobbies',     label:'Lobbies',     icon:'Users' },
    { id:'challenges',  label:'Challenges',  icon:'MessageCircle' },
  ]},
  { section:'Games', items:[
    { id:'games',   label:'Games',  icon:'Gamepad2' },
    { id:'suggest', label:'Suggest',icon:'Lightbulb' },
  ]},
];

function Sidebar({ page, setPage }) {
  return (
    <aside style={{ position:'fixed', top:0, left:0, bottom:0, width:224,
      display:'flex', flexDirection:'column', background:P.surf,
      borderRight:`1px solid ${P.bdr}`, zIndex:40 }}>

      {/* Logo */}
      <div style={{ padding:'14px 16px', borderBottom:`1px solid ${P.bdr}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:32, height:32, borderRadius:4, overflow:'hidden', background:P.night, flexShrink:0 }}>
            <img src="../assets/mechi-logo-shield.png" style={{ width:'100%', height:'100%', objectFit:'contain' }} alt="" />
          </div>
          <span style={{ fontFamily:"'Montserrat',sans-serif", fontWeight:900, fontSize:15, letterSpacing:'0.2em', textTransform:'uppercase' }}>Mechi</span>
        </div>
        <Icon name="Sun" size={14} color={P.txt3} />
      </div>

      {/* Nav */}
      <nav style={{ flex:1, overflowY:'auto', padding:'8px 8px' }}>
        {NAV.map((grp,gi) => (
          <div key={gi} style={{ marginBottom:4 }}>
            {grp.section && <p style={{ padding:'10px 10px 4px', fontSize:9, fontFamily:"'Montserrat',sans-serif",
              fontWeight:800, letterSpacing:'0.18em', textTransform:'uppercase', color:P.txt3 }}>{grp.section}</p>}
            {grp.items.map(item => {
              const a = page === item.id;
              return <button key={item.id} onClick={() => setPage(item.id)}
                style={{ width:'100%', display:'flex', alignItems:'center', gap:10, padding:'9px 10px',
                  borderRadius:6, border:`1px solid ${a ? P.tealBdr : 'transparent'}`,
                  background: a ? P.tealSoft : 'transparent',
                  color: a ? P.txt : P.txt2,
                  fontFamily:"'Montserrat',sans-serif", fontSize:12, fontWeight:a ? 700 : 600,
                  textAlign:'left', marginBottom:2, cursor:'pointer', transition:'all 140ms ease' }}>
                <Icon name={item.icon} size={15} color={a ? P.tealTxt : P.txt3} />
                {item.label}
              </button>;
            })}
          </div>
        ))}
      </nav>

      {/* User */}
      <div style={{ borderTop:`1px solid ${P.bdr}`, padding:'10px 10px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:8 }}>
          {[['Bell','notifications'],['User','profile'],['Settings','settings']].map(([ic,pg]) => (
            <button key={pg} onClick={() => setPage(pg)}
              style={{ flex:1, height:30, display:'flex', alignItems:'center', justifyContent:'center',
                borderRadius:5, border:`1px solid ${page===pg ? P.tealBdr : P.bdr}`,
                background: page===pg ? P.tealSoft : 'transparent', color: page===pg ? P.tealTxt : P.txt3, cursor:'pointer' }}>
              <Icon name={ic} size={13} />
            </button>
          ))}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 10px',
          border:`1px solid ${P.bdr}`, borderRadius:6, background:P.surfHi }}>
          <Av name="P" size={30} />
          <div style={{ flex:1, minWidth:0 }}>
            <p style={{ fontSize:12, fontWeight:700, fontFamily:"'Montserrat',sans-serif", color:P.txt, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>ProGamer_KE</p>
            <p style={{ fontSize:10, color:P.txt3 }}>Free Plan</p>
          </div>
          <Icon name="LogOut" size={12} color={P.txt3} />
        </div>
      </div>
    </aside>
  );
}

// ── GAMES data ────────────────────────────────────────────────
const GAMES = [
  { key:'fc26',     label:'FIFA FC 26',  c1:'#0d1520', c2:'#0a2540', rank:'Gold',   rColor:'#d4a323', wins:24, losses:11, wr:69, queue:4, mode:'1v1' },
  { key:'valorant', label:'Valorant',    c1:'#1a0808', c2:'#280a0a', rank:'Plat',   rColor:'#60a5fa', wins:18, losses:14, wr:56, queue:2, mode:'1v1' },
  { key:'tekken8',  label:'Tekken 8',    c1:'#080a18', c2:'#0c1230', rank:'Silver', rColor:'#94a0b2', wins:9,  losses:8,  wr:53, queue:1, mode:'1v1' },
  { key:'pubgm',    label:'PUBG Mobile', c1:'#0a1218', c2:'#0e1e28', queue:0, mode:'lobby' },
  { key:'freefire', label:'Free Fire',   c1:'#180e00', c2:'#2a1800', queue:3, mode:'lobby' },
];

// ── Game Card ─────────────────────────────────────────────────
function GameCard({ g, setPage }) {
  const [hov, setHov] = useState(false);
  const isLobby = g.mode === 'lobby';
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ ...card, overflow:'hidden', transition:'all 260ms ease',
        transform: hov ? 'translateY(-3px)' : 'none',
        boxShadow: hov ? '0 16px 40px rgba(0,0,0,0.4)' : 'none' }}>
      {/* Cover */}
      <div style={{ height:120, position:'relative', overflow:'hidden',
        background:`linear-gradient(135deg,${g.c1},${g.c2})` }}>
        <img src={`../game-artwork/${g.key}-header.svg`} alt={g.label}
          style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover',
            transform: hov ? 'scale(1.04)' : 'scale(1)', transition:'transform 500ms ease', opacity:0.65 }}
          onError={e => { e.target.style.display='none'; }} />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.2) 60%,transparent 100%)' }} />
        {g.queue > 0 && (
          <div style={{ position:'absolute', top:8, left:8, display:'flex', alignItems:'center', gap:4,
            background:'rgba(0,0,0,0.7)', backdropFilter:'blur(6px)', border:`1px solid ${P.tealBdr}`,
            borderRadius:4, padding:'3px 8px', fontSize:9, fontFamily:"'Montserrat',sans-serif", fontWeight:700, color:P.tealTxt }}>
            <span style={{ width:5, height:5, borderRadius:'50%', background:P.teal, display:'inline-block' }} />
            {g.queue} in queue
          </div>
        )}
        <span style={{ position:'absolute', top:8, right:8,
          background: isLobby ? 'rgba(96,165,250,0.8)' : 'rgba(34,197,94,0.8)',
          color:'white', fontFamily:"'Montserrat',sans-serif", fontSize:8, fontWeight:800,
          letterSpacing:'0.1em', padding:'2px 7px', borderRadius:3 }}>{isLobby ? 'LOBBY' : '1V1'}</span>
        <p style={{ position:'absolute', bottom:8, left:10, fontFamily:"'Montserrat',sans-serif",
          fontSize:'1.1rem', fontWeight:900, color:'white', textShadow:'0 4px 16px rgba(0,0,0,0.6)', lineHeight:1.1 }}>{g.label}</p>
      </div>
      {/* Body */}
      <div style={{ padding:12, display:'flex', flexDirection:'column', gap:10 }}>
        {!isLobby && g.rank && (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:4 }}>
            {[
              { v:g.rank, l:'Rank', col:g.rColor },
              { v:g.wins, l:'W', col:'#34d399' },
              { v:g.losses, l:'L', col:'#f87171' },
              { v:`${g.wr}%`, l:'WR', col:'#60a5fa' },
            ].map(s => (
              <div key={s.l} style={{ border:`1px solid ${P.bdr}`, borderRadius:5, background:P.surfHi, padding:'5px 3px', textAlign:'center' }}>
                <div style={{ fontFamily:"'Montserrat',sans-serif", fontSize:11, fontWeight:800, color:s.col }}>{s.v}</div>
                <div style={{ fontSize:8, fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', color:P.txt3, marginTop:2 }}>{s.l}</div>
              </div>
            ))}
          </div>
        )}
        <button onClick={() => setPage(isLobby ? 'lobbies' : 'dashboard')}
          style={{ width:'100%', minHeight:38, border: isLobby ? `1px solid ${P.tealBdr}` : 'none',
            borderRadius:6, background: isLobby ? P.tealSoft : P.teal,
            color: isLobby ? P.tealTxt : P.night,
            fontFamily:"'Montserrat',sans-serif", fontSize:12, fontWeight:700,
            boxShadow: isLobby ? 'none' : '0 8px 20px rgba(50,224,196,0.18)',
            display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
          <Icon name={isLobby ? 'Users' : 'Swords'} size={12} color={isLobby ? P.tealTxt : P.night} />
          {isLobby ? 'View Lobbies' : 'Find Match'}
        </button>
      </div>
    </div>
  );
}

// ── Online Player Row ─────────────────────────────────────────
function PlayerRow({ username, level, game, platform, waitMins }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 14px',
      ...card, transition:'border-color 140ms', cursor:'pointer' }}>
      <div style={{ width:38, height:38, borderRadius:4, border:`1px solid ${P.tealBdr}`,
        background:P.tealSoft, display:'flex', alignItems:'center', justifyContent:'center',
        fontFamily:"'Montserrat',sans-serif", fontSize:15, fontWeight:900, color:P.tealTxt, flexShrink:0 }}>
        {username[0].toUpperCase()}
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:2 }}>
          <p style={{ fontSize:12, fontWeight:700, color:P.txt, fontFamily:"'Montserrat',sans-serif" }}>{username}</p>
          <Chip c="teal">Lv. {level}</Chip>
        </div>
        <p style={{ fontSize:11, color:P.txt2 }}>{game}{platform ? ` / ${platform}` : ''}</p>
        <p style={{ fontSize:10, color:P.txt3, marginTop:1 }}>{waitMins > 0 ? `${waitMins}m in queue` : 'Just joined'}</p>
      </div>
      <Icon name="ChevronRight" size={13} color={P.txt3} />
    </div>
  );
}

// ── Dashboard Page ────────────────────────────────────────────
function DashboardPage({ setPage }) {
  const ranked = GAMES.filter(g => g.mode === '1v1');
  const lobby  = GAMES.filter(g => g.mode === 'lobby');
  const players = [
    { username:'NairobiPhoenix', level:18, game:'FIFA FC 26', platform:'PSN', waitMins:3 },
    { username:'MombasaGhost',   level:14, game:'FIFA FC 26', platform:'PSN', waitMins:1 },
    { username:'AccraFire',      level:22, game:'Valorant',   platform:'PC',  waitMins:7 },
  ];

  return (
    <div style={{ padding:'24px 28px 48px', maxWidth:1060, margin:'0 auto' }}>

      {/* ── Hero ── */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 240px', gap:16, marginBottom:28 }}>

        {/* Left — flat, no nesting */}
        <div style={{ ...card, padding:'22px 24px' }}>
          <div style={{ display:'flex', gap:6, marginBottom:14 }}>
            <Chip c="teal">Dashboard</Chip>
            <Chip c="coral">Gold II</Chip>
          </div>
          <h1 style={{ fontFamily:"'Montserrat',sans-serif", fontSize:'1.75rem', fontWeight:900,
            color:P.txt, lineHeight:1.1, marginBottom:8 }}>
            Command your climb, ProGamer_KE.
          </h1>
          <p style={{ fontSize:13, color:P.txt2, lineHeight:1.6, maxWidth:480, marginBottom:16 }}>
            Check your live queue energy, level track, and next match from one cleaner home base.
          </p>
          <div style={{ display:'flex', gap:8, marginBottom:20 }}>
            <Btn v="outline" sm><Icon name="CirclePlay" size={12} /> Quick intro</Btn>
            <Btn v="outline" sm><Icon name="BookOpen" size={12} /> Full tutorial</Btn>
          </div>
          {/* XP bar — inline, no wrapper card */}
          <div style={{ borderTop:`1px solid ${P.bdr}`, paddingTop:14 }}>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:9,
              fontFamily:"'Montserrat',sans-serif", fontWeight:700, letterSpacing:'0.12em',
              textTransform:'uppercase', color:P.txt3, marginBottom:8 }}>
              <span>XP Progress</span><span>620 / 1000</span>
            </div>
            <div style={{ height:6, borderRadius:2, background:'rgba(255,255,255,0.06)', overflow:'hidden' }}>
              <div style={{ height:'100%', width:'62%', borderRadius:2, background:'linear-gradient(90deg,#32e0c4,#ff6b6b)' }} />
            </div>
            <div style={{ display:'flex', gap:6, marginTop:10 }}>
              <Chip c="teal">Lv. 12</Chip>
              <Chip c="coral">350 MP</Chip>
              <span style={{ fontSize:11, color:P.txt3 }}>380 XP until next level</span>
            </div>
          </div>
        </div>

        {/* Right — two minimal stat panels */}
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <div style={{ ...card, padding:'16px 18px', flex:1 }}>
            <p style={{ fontSize:9, fontFamily:"'Montserrat',sans-serif", fontWeight:700, letterSpacing:'0.14em',
              textTransform:'uppercase', color:P.txt3, marginBottom:8 }}>Queue Heat</p>
            <p style={{ fontFamily:"'Montserrat',sans-serif", fontSize:'2rem', fontWeight:900, color:P.teal, lineHeight:1 }}>Hot</p>
            <p style={{ fontSize:11, color:P.txt3, marginTop:8, lineHeight:1.5 }}>Queue traffic moving fast across your ranked lane.</p>
          </div>
          <div style={{ ...card, padding:'16px 18px', flex:1 }}>
            <p style={{ fontSize:9, fontFamily:"'Montserrat',sans-serif", fontWeight:700, letterSpacing:'0.14em',
              textTransform:'uppercase', color:P.txt3, marginBottom:8 }}>Win Streak</p>
            <p style={{ fontFamily:"'Montserrat',sans-serif", fontSize:'2rem', fontWeight:900, color:P.coral, lineHeight:1 }}>7</p>
            <p style={{ fontSize:11, color:P.txt3, marginTop:8, lineHeight:1.5 }}>Matches won in a row right now.</p>
          </div>
        </div>
      </div>

      {/* ── Online Players ── */}
      <section style={{ marginBottom:28 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <SLabel style={{ marginBottom:0 }}>Players Online Now</SLabel>
          <Chip c="teal"><span style={{ width:5, height:5, borderRadius:'50%', background:P.teal, display:'inline-block', marginRight:4 }} />{players.length} live</Chip>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))', gap:8 }}>
          {players.map(p => <PlayerRow key={p.username} {...p} />)}
        </div>
      </section>

      {/* ── Ranked Games ── */}
      <section style={{ marginBottom:28 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <SLabel style={{ marginBottom:0 }}>Ranked Games</SLabel>
          <button onClick={() => setPage('leaderboard')} style={{ background:'none', border:'none',
            color:P.tealTxt, fontSize:11, fontFamily:"'Montserrat',sans-serif", fontWeight:700, cursor:'pointer' }}>
            View leaderboard →
          </button>
        </div>

}

function NotificationsPage() {
  const [notifs, setNotifs] = useState(NOTIFS);
  const markAll = () => setNotifs(n => n.map(x => ({...x, read:true})));
  const unread = notifs.filter(n => !n.read).length;

  return (
    <div style={{ padding:'24px 28px 48px', maxWidth:860, margin:'0 auto' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18 }}>
        <div>
          <SLabel style={{ marginBottom:4 }}>Notifications</SLabel>
          <h2 style={{ fontFamily:"'Montserrat',sans-serif", fontSize:'1.5rem', fontWeight:900, color:P.txt }}>Activity Feed</h2>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {unread > 0 && <Chip c="coral">{unread} unread</Chip>}
          <Btn v="outline" sm onClick={markAll}><Icon name="CheckCheck" size={12} /> Mark all read</Btn>
        </div>
      </div>

      <div style={{ ...card }}>
        {notifs.map((n, i) => (
          <div key={n.id} onClick={() => setNotifs(ns => ns.map(x => x.id===n.id ? {...x,read:true} : x))}
            style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'14px 18px',
              borderBottom: i < notifs.length-1 ? `1px solid ${P.bdr}` : 'none',
              background: n.read ? 'transparent' : 'rgba(50,224,196,0.04)', cursor:'pointer',
              transition:'background 140ms ease' }}>
            <div style={{ width:36, height:36, borderRadius:5, flexShrink:0,
              background: n.cc==='coral' ? P.coralSoft : n.cc==='teal' ? P.tealSoft : 'rgba(95,109,130,0.12)',
              border:`1px solid ${n.cc==='coral' ? P.coralBdr : n.cc==='teal' ? P.tealBdr : P.bdr}`,
              display:'flex', alignItems:'center', justifyContent:'center' }}>
              <Icon name={n.icon} size={15} color={n.cc==='coral' ? '#ff8383' : n.cc==='teal' ? P.tealTxt : P.txt3} />
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, marginBottom:3 }}>
                <p style={{ fontFamily:"'Montserrat',sans-serif", fontSize:13, fontWeight: n.read ? 600 : 800,
                  color: n.read ? P.txt2 : P.txt, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{n.title}</p>
                <span style={{ fontSize:10, color:P.txt3, flexShrink:0 }}>{n.time}</span>
              </div>
              <p style={{ fontSize:12, color:P.txt3, lineHeight:1.55 }}>{n.body}</p>
            </div>
            {!n.read && (
              <div style={{ width:7, height:7, borderRadius:'50%', background:P.teal, flexShrink:0, marginTop:5 }} />
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState(() => {
    try { return localStorage.getItem('mechi_ds_page') || 'dashboard'; } catch { return 'dashboard'; }
  });

  useEffect(() => {
    try { localStorage.setItem('mechi_ds_page', page); } catch {}
  }, [page]);

  useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  const pages = {
    dashboard:     <DashboardPage setPage={setPage} />,
    leaderboard:   <LeaderboardPage />,
    tournaments:   <TournamentsPage />,
    profile:       <ProfilePage />,
    challenges:    <ChallengesPage />,
    tutorials:     <TutorialsPage setPage={setPage} />,
    lobbies:       <LobbiesPage setPage={setPage} />,
    games:         <GamesPage />,
    suggest:       <SuggestPage />,
    share:         <SharePage />,
    notifications: <NotificationsPage />,
    settings:      <ProfilePage />,
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar page={page} setPage={setPage} />
      <main style={{ marginLeft:224, flex:1, minHeight:'100vh', overflowX:'hidden' }}>
        {pages[page] || <PlaceholderPage title={page} icon="Layout" />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
