<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1121;padding:24px;font-family:'Montserrat',sans-serif;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid rgba(226,232,240,0.09);border-radius:6px;overflow:hidden;}
.cell{padding:22px 24px;border-right:1px solid rgba(226,232,240,0.09);border-bottom:1px solid rgba(226,232,240,0.09);}
.cell:nth-child(2n){border-right:none;}
.cell:nth-last-child(-n+2){border-bottom:none;}
.meta{font-size:8px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#7b879a;margin-bottom:12px;}
.d1{font-size:2.2rem;font-weight:900;color:#f8fbfd;line-height:1.04;letter-spacing:-0.01em;}
.d2{font-size:1.5rem;font-weight:900;color:#f8fbfd;line-height:1.1;}
.d3{font-size:1.1rem;font-weight:800;color:#f8fbfd;line-height:1.15;}
.wordmark{font-size:1.6rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;
  background:linear-gradient(90deg,#32e0c4 0%,#ff6b6b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tagline{font-size:9px;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:#7b879a;margin-top:6px;}
.kicker{display:inline-block;font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;
  color:#8ef2e4;border:1px solid rgba(50,224,196,0.22);background:rgba(50,224,196,0.10);padding:3px 9px;border-radius:4px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="grid">
  <div class="cell">
    <div class="meta">Display / H1 — 900, −0.01em tracking</div>
    <div class="d1">Command your<br><span style="color:#32e0c4">climb.</span></div>
  </div>
  <div class="cell">
    <div class="meta">H2 — 900, three-line rhythm</div>
    <div class="d2">Compete.<br><span style="color:#32e0c4">Connect.</span><br><span style="color:#ff6b6b">Rise.</span></div>
  </div>
  <div class="cell">
    <div class="meta">H3 + Section Kicker</div>
    <div class="kicker">Ranked Games</div>
    <div class="d3">Players Online Now</div>
  </div>
  <div class="cell" style="display:flex;flex-direction:column;justify-content:center;gap:6px;">
    <div class="meta">Brand Wordmark — 0.2em tracking</div>
    <div class="wordmark">MECHI</div>
    <div class="tagline">Compete · Connect · Rise</div>
  </div>
</div>
</body>
</html>
