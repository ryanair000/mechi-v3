<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1121;padding:24px;font-family:'Montserrat',sans-serif;}
.wrap{border:1px solid rgba(226,232,240,0.09);border-radius:6px;overflow:hidden;}
.section{padding:10px 18px;border-bottom:1px solid rgba(226,232,240,0.09);
  font-size:8px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#7b879a;background:#0e1625;}
.row{display:flex;gap:8px;padding:16px 18px;border-bottom:1px solid rgba(226,232,240,0.09);align-items:center;flex-wrap:wrap;}
.row:last-child{border-bottom:none;}
/* Base chip/badge */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:800;letter-spacing:0.1em;
  text-transform:uppercase;padding:3px 9px;border-radius:4px;border:1px solid transparent;}
/* Variants */
.teal {background:rgba(50,224,196,0.10);border-color:rgba(50,224,196,0.22);color:#8ef2e4;}
.coral{background:rgba(255,107,107,0.14);border-color:rgba(255,107,107,0.22);color:#ffaaaa;}
.gray {background:rgba(95,109,130,0.12);border-color:rgba(226,232,240,0.09);color:#7b879a;}
.blue {background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.2);color:#93c5fd;}
.gold {background:rgba(212,163,35,0.14);border-color:rgba(212,163,35,0.24);color:#d4a323;}
.green{background:rgba(52,211,153,0.12);border-color:rgba(52,211,153,0.22);color:#34d399;}
.red  {background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.2);  color:#f87171;}
/* Live dot */
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
/* Pill — for plan badges */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:800;letter-spacing:0.1em;
  text-transform:uppercase;padding:3px 10px;border-radius:999px;border:1px solid transparent;}
/* Rank badge — distinct shape */
.rank{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:900;letter-spacing:0.02em;
  padding:4px 10px;border-radius:4px;border:1px solid transparent;}
</style>
</head>
<body>
<div class="wrap">
  <div class="section">Game Mode Tags</div>
  <div class="row">
    <span class="chip green">1V1</span>
    <span class="chip blue">Lobby</span>
    <span class="chip gold">Tournament</span>
    <span class="chip coral">Finals</span>
  </div>

  <div class="section">Queue & Live State</div>
  <div class="row">
    <span class="chip teal"><span class="dot"></span>4 in queue</span>
    <span class="chip teal"><span class="dot"></span>Live match</span>
    <span class="chip gray">Quiet</span>
    <span class="chip coral">Building</span>
    <span class="chip teal">Hot</span>
  </div>

  <div class="section">Rank Badges</div>
  <div class="row">
    <span class="rank" style="background:rgba(212,163,35,0.14);border-color:rgba(212,163,35,0.3);color:#d4a323;">Gold II</span>
    <span class="rank" style="background:rgba(192,192,192,0.12);border-color:rgba(192,192,192,0.24);color:#b9c4d2;">Silver III</span>
    <span class="rank" style="background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.22);color:#93c5fd;">Plat I</span>
    <span class="rank" style="background:rgba(50,224,196,0.12);border-color:rgba(50,224,196,0.22);color:#8ef2e4;">Diamond</span>
    <span class="rank" style="background:rgba(255,107,107,0.10);border-color:rgba(255,107,107,0.2);color:#ffaaaa;">Bronze</span>
  </div>

  <div class="section">Player Meta</div>
  <div class="row">
    <span class="chip teal">Lv. 12</span>
    <span class="chip coral">350 MP</span>
    <span class="chip gray">Free Plan</span>
    <span class="pill teal">Pro Plan</span>
    <span class="pill" style="background:rgba(212,163,35,0.12);border-color:rgba(212,163,35,0.24);color:#d4a323;">Elite Plan</span>
    <span class="chip teal">You</span>
    <span class="chip gray">East Africa</span>
  </div>

  <div class="section">Match Result</div>
  <div class="row">
    <span class="chip green">Win</span>
    <span class="chip red">Loss</span>
    <span class="chip gold">Draw</span>
    <span class="chip blue">Pending</span>
    <span class="chip gray">Cancelled</span>
    <span class="chip coral">Disputed</span>
  </div>
</div>
</body>
</html>
