<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--page-bg); font-family: var(--font-body); padding: 20px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch { flex: 1; min-width: 100px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
.swatch-color { height: 56px; border-bottom: 1px solid var(--border-color); }
.swatch-info { padding: 8px 10px; background: var(--surface-strong); }
.name { font-family: var(--font-display); font-size: 10px; font-weight: 700; color: var(--text-primary); }
.hex { font-family: monospace; font-size: 9px; color: var(--text-soft); margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="swatch-color" style="background:#ffffff; border:1px solid #e2e8f0;"></div>
    <div class="swatch-info"><div class="name">Surface Strong</div><div class="hex">#FFFFFF</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#fdfefe;"></div>
    <div class="swatch-info"><div class="name">Surface Elevated</div><div class="hex">#FDFEFE</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#f4f7fb;"></div>
    <div class="swatch-info"><div class="name">Page BG</div><div class="hex">#F4F7FB</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#e2e8f0;"></div>
    <div class="swatch-info"><div class="name">Brand Neutral</div><div class="hex">#E2E8F0</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#94a0b2;"></div>
    <div class="swatch-info"><div class="name">Text Soft</div><div class="hex">#94A0B2</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#607086;"></div>
    <div class="swatch-info"><div class="name">Text Secondary</div><div class="hex">#607086</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#0b1121;"></div>
    <div class="swatch-info"><div class="name">Text Primary</div><div class="hex">#0B1121</div></div>
  </div>
</div>
</body>
</html>
