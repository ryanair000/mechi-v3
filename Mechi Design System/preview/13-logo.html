<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1121;padding:24px;font-family:'Montserrat',sans-serif;}
.wrap{border:1px solid rgba(226,232,240,0.09);border-radius:6px;overflow:hidden;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.cell{padding:22px 26px;border-right:1px solid rgba(226,232,240,0.09);border-bottom:1px solid rgba(226,232,240,0.09);display:flex;flex-direction:column;align-items:flex-start;justify-content:center;}
.cell:nth-child(2n){border-right:none;}
.cell:nth-last-child(-n+2){border-bottom:none;}
.meta{font-size:8px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#7b879a;margin-bottom:14px;}
.mark{width:56px;height:56px;border-radius:6px;overflow:hidden;background:#0b1121;}
.mark img{width:100%;height:100%;object-fit:contain;}
.wordmark{font-size:1.5rem;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;
  background:linear-gradient(90deg,#32e0c4,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tagline{font-size:9px;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:#7b879a;margin-top:5px;}
/* dark bg version */
.dark-pill{background:rgba(11,17,33,0.6);border:1px solid rgba(226,232,240,0.09);border-radius:6px;padding:14px 18px;display:flex;align-items:center;gap:12px;}
/* sizes */
.sizes{display:flex;align-items:center;gap:16px;}
.sz{display:flex;flex-direction:column;align-items:center;gap:6px;}
.sz-label{font-size:8px;font-weight:700;color:#7b879a;letter-spacing:0.1em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <!-- Full logo light bg -->
    <div class="cell">
      <div class="meta">Full Logo — Dark Background</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="mark"><img src="../assets/mechi-logo.png" alt="Mechi"></div>
        <div>
          <div class="wordmark">MECHI</div>
          <div class="tagline">Compete · Connect · Rise</div>
        </div>
      </div>
    </div>
    <!-- Wordmark only -->
    <div class="cell">
      <div class="meta">Wordmark — gradient treatment</div>
      <div class="wordmark" style="font-size:2rem;">MECHI</div>
      <div class="tagline">Compete · Connect · Rise</div>
    </div>
    <!-- Symbol sizes -->
    <div class="cell">
      <div class="meta">Symbol — Size Scale</div>
      <div class="sizes">
        <div class="sz">
          <div style="width:48px;height:48px;border-radius:8px;overflow:hidden;background:#0b1121;"><img src="../assets/mechi-logo.png" style="width:100%;height:100%;object-fit:contain;" alt=""></div>
          <div class="sz-label">lg</div>
        </div>
        <div class="sz">
          <div style="width:36px;height:36px;border-radius:6px;overflow:hidden;background:#0b1121;"><img src="../assets/mechi-logo.png" style="width:100%;height:100%;object-fit:contain;" alt=""></div>
          <div class="sz-label">md</div>
        </div>
        <div class="sz">
          <div style="width:28px;height:28px;border-radius:5px;overflow:hidden;background:#0b1121;"><img src="../assets/mechi-logo.png" style="width:100%;height:100%;object-fit:contain;" alt=""></div>
          <div class="sz-label">sm</div>
        </div>
        <div class="sz">
          <div style="width:20px;height:20px;border-radius:4px;overflow:hidden;background:#0b1121;"><img src="../assets/mechi-logo.png" style="width:100%;height:100%;object-fit:contain;" alt=""></div>
          <div class="sz-label">xs</div>
        </div>
      </div>
    </div>
    <!-- Sidebar usage -->
    <div class="cell">
      <div class="meta">In Context — Sidebar Header</div>
      <div class="dark-pill">
        <div style="width:32px;height:32px;border-radius:5px;overflow:hidden;background:#0b1121;flex-shrink:0;">
          <img src="../assets/mechi-logo.png" style="width:100%;height:100%;object-fit:contain;" alt="">
        </div>
        <span style="font-size:15px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:#f8fbfd;">MECHI</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
