<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="efootball_mobile-header-title efootball_mobile-header-desc">
  <title id="efootball_mobile-header-title">eFootball Mobile</title>
  <desc id="efootball_mobile-header-desc">Stylized Mechi game artwork for eFootball Mobile.</desc>
  <defs>
    <linearGradient id="bg-efootball_mobile-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1823"/>
      <stop offset="100%" stop-color="#1d4b53"/>
    </linearGradient>
    <linearGradient id="accent-efootball_mobile-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38d7c2"/>
      <stop offset="100%" stop-color="#8bf0dd"/>
    </linearGradient>
    <radialGradient id="glow-efootball_mobile-h" cx="78%" cy="24%" r="52%">
      <stop offset="0%" stop-color="#38d7c2" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#38d7c2" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid-efootball_mobile-h" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg-efootball_mobile-h)"/>
  <rect width="1600" height="900" fill="url(#grid-efootball_mobile-h)" opacity="0.38"/>
  <rect width="1600" height="900" fill="url(#glow-efootball_mobile-h)"/>
  <g opacity="0.9">
    <circle cx="1220" cy="250" r="200" fill="none" stroke="url(#accent-efootball_mobile-h)" stroke-width="6" opacity="0.55"/>
    <circle cx="1220" cy="250" r="142" fill="none" stroke="white" stroke-width="2" opacity="0.18"/>
    <path d="M1080 120 L1490 210 L1320 520 L980 440 Z" fill="url(#accent-efootball_mobile-h)" opacity="0.12"/>
    <path d="M1000 600 L1520 420 L1510 760 L1140 860 Z" fill="url(#accent-efootball_mobile-h)" opacity="0.14"/>
  </g>
  <g transform="translate(88 78)">
    <rect x="0" y="0" width="114" height="34" rx="17" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
    <text x="57" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="2">MECHI</text>
  </g>
  <g transform="translate(1240 80)">
    <rect x="0" y="0" width="200" height="42" rx="21" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
    <text x="100" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="2">RANKED</text>
  </g>
  <g transform="translate(88 620)">
    <rect x="0" y="0" width="620" height="170" rx="34" fill="rgba(8,12,18,0.42)" stroke="rgba(255,255,255,0.12)"/>
    <text x="42" y="66" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#8bf0dd" letter-spacing="3">POCKET LADDER</text>
    <text x="42" y="126" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff">eFootball Mobile</text>
    <rect x="42" y="138" width="240" height="7" rx="3.5" fill="url(#accent-efootball_mobile-h)"/>
  </g>
</svg>
