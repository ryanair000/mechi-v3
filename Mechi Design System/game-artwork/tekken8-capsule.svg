<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="tekken8-capsule-title tekken8-capsule-desc">
  <title id="tekken8-capsule-title">Tekken 8</title>
  <desc id="tekken8-capsule-desc">Stylized Mechi capsule artwork for Tekken 8.</desc>
  <defs>
    <linearGradient id="bg-tekken8-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#180d18"></stop>
      <stop offset="100%" stop-color="#451626"></stop>
    </linearGradient>
    <linearGradient id="accent-tekken8-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5c7a"></stop>
      <stop offset="100%" stop-color="#ffb347"></stop>
    </linearGradient>
    <radialGradient id="glow-tekken8-c" cx="72%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff5c7a" stop-opacity="0.34"></stop>
      <stop offset="100%" stop-color="#ff5c7a" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
  <rect width="900" height="1200" fill="url(#bg-tekken8-c)"></rect>
