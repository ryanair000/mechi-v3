<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="ludo-header-title ludo-header-desc">
  <title id="ludo-header-title">Ludo</title>
  <desc id="ludo-header-desc">Stylized Mechi game artwork for Ludo.</desc>
  <defs>
    <linearGradient id="bg-ludo-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#162c2c"/>
    </linearGradient>
    <linearGradient id="gold-ludo-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff9f43"/>
    </linearGradient>
    <radialGradient id="glow-ludo-h" cx="78%" cy="24%" r="52%">
      <stop offset="0%" stop-color="#32e0c4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#32e0c4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid-ludo-h" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg-ludo-h)"/>
  <rect width="1600" height="900" fill="url(#grid-ludo-h)" opacity="0.35"/>
  <rect width="1600" height="900" fill="url(#glow-ludo-h)"/>
  <g opacity="0.9">
    <rect x="960" y="122" width="420" height="420" rx="72" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
    <rect x="1038" y="200" width="110" height="110" rx="28" fill="#ff6b6b" opacity="0.88"/>
    <rect x="1190" y="200" width="110" height="110" rx="28" fill="#ffd166" opacity="0.92"/>
    <rect x="1038" y="352" width="110" height="110" rx="28" fill="#32e0c4" opacity="0.9"/>
    <rect x="1190" y="352" width="110" height="110" rx="28" fill="#60a5fa" opacity="0.88"/>
    <circle cx="1168" cy="332" r="34" fill="rgba(255,255,255,0.92)"/>
    <circle cx="1240" cy="438" r="20" fill="rgba(255,255,255,0.2)"/>
    <circle cx="1088" cy="438" r="20" fill="rgba(255,255,255,0.2)"/>
