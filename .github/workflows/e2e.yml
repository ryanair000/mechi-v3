          missing=()
          for key in E2E_SUPABASE_URL E2E_SUPABASE_SERVICE_ROLE_KEY NEXT_PUBLIC_SUPABASE_ANON_KEY JWT_SECRET CRON_SECRET; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:player-mobile
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-player-mobile-artifacts
          path: |
