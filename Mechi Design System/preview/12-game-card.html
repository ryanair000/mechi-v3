<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--page-bg); padding: 20px; display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
.game-card { width: 190px; border-radius: 1.7rem; border: 1px solid rgba(11,17,33,0.08); background: linear-gradient(180deg,#fff,rgba(255,255,255,0.94)); box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 18px 40px rgba(15,23,42,0.06); overflow: hidden; }
.game-cover { height: 120px; position: relative; overflow: hidden; border-bottom: 1px solid rgba(11,17,33,0.08); }
.cover-bg { width: 100%; height: 100%; object-fit: cover; }
.cover-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.84) 0%, rgba(0,0,0,0.32) 50%, transparent 100%); }
.cover-tag { position: absolute; top: 10px; right: 10px; background: rgba(34,197,94,0.85); color: white; font-family: 'Montserrat',sans-serif; font-size: 9px; font-weight: 800; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 999px; }
.cover-queue { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.88); color: #0b776b; font-family: 'Montserrat',sans-serif; font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 999px; display: flex; align-items: center; gap: 4px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.45); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #32e0c4; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.game-title { position: absolute; bottom: 10px; left: 12px; font-family: 'Montserrat',sans-serif; font-size: 1.2rem; font-weight: 900; color: white; text-shadow: 0 8px 24px rgba(0,0,0,0.4); line-height: 1.1; }
.game-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; }
.stat-box { border: 1px solid rgba(11,17,33,0.08); border-radius: 10px; background: #fff; padding: 5px 3px; text-align: center; }
.stat-v { font-family: 'Montserrat',sans-serif; font-size: 12px; font-weight: 800; }
.stat-l { font-family: 'Open Sans',sans-serif; font-size: 8px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #94a0b2; margin-top: 2px; }
.btn-find { width: 100%; min-height: 40px; border: none; border-radius: 1rem; background: #32e0c4; color: #0b1121; font-family: 'Montserrat',sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 16px 28px rgba(50,224,196,0.22); display: flex; align-items: center; justify-content: center; gap: 5px; }
/* Cover art using SVG game art */
.cover-svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<!-- Ranked 1v1 card -->
<div class="game-card">
  <div class="game-cover" style="background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);">
    <div class="cover-gradient"></div>
    <div class="cover-queue"><div class="live-dot"></div>4 in queue</div>
    <div class="cover-tag">1V1</div>
    <div class="game-title">FIFA FC 26</div>
  </div>
  <div class="game-body">
    <div class="stats">
      <div class="stat-box"><div class="stat-v" style="color:#d4a323">Gold</div><div class="stat-l">Rank</div></div>
      <div class="stat-box"><div class="stat-v" style="color:#34d399">24</div><div class="stat-l">W</div></div>
      <div class="stat-box"><div class="stat-v" style="color:#f87171">11</div><div class="stat-l">L</div></div>
      <div class="stat-box"><div class="stat-v" style="color:#60a5fa">69%</div><div class="stat-l">WR</div></div>
    </div>
    <button class="btn-find">⚔ Find Match</button>
  </div>
</div>

<!-- Lobby card -->
<div class="game-card">
  <div class="game-cover" style="background:linear-gradient(135deg,#0d1b2a,#1b263b,#415a77);">
    <div class="cover-gradient"></div>
    <div class="cover-tag" style="background:rgba(96,165,250,0.85)">LOBBY</div>
    <div class="game-title">PUBG Mobile</div>
  </div>
  <div class="game-body">
    <button class="btn-find" style="background:#ff6b6b;box-shadow:0 12px 28px rgba(255,107,107,0.24)">👥 View Lobbies</button>
  </div>
</div>
</body>
</html>
