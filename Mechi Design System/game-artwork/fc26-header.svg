<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="fc26-header-title fc26-header-desc">
  <title id="fc26-header-title">EA FC 26</title>
  <desc id="fc26-header-desc">Stylized Mechi game artwork for EA FC 26.</desc>
  <defs>
    <linearGradient id="bg-fc26-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13152d"></stop>
      <stop offset="100%" stop-color="#3d1b48"></stop>
    </linearGradient>
    <linearGradient id="accent-fc26-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a59"></stop>
      <stop offset="100%" stop-color="#ffd166"></stop>
    </linearGradient>
    <radialGradient id="glow-fc26-h" cx="78%" cy="24%" r="52%">
      <stop offset="0%" stop-color="#ff7a59" stop-opacity="0.34"></stop>
      <stop offset="100%" stop-color="#ff7a59" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid-fc26-h" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"></path>
