<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--page-bg); padding: 20px; font-family: var(--font-body); }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
.box { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.r { background: var(--surface-strong); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; }
.label { font-family: monospace; font-size: 9px; color: var(--text-soft); text-align: center; }
.sep { border-top: 1px solid var(--border-color); margin: 8px 0 12px; }
.shadow-row { display: flex; gap: 16px; flex-wrap: wrap; }
.shadow-box { background: var(--surface-strong); border: 1px solid var(--border-color); border-radius: 14px; padding: 14px 16px; flex: 1; min-width: 120px; }
.shadow-name { font-size: 10px; font-weight: 700; color: var(--text-primary); font-family: var(--font-display); }
.shadow-val { font-family: monospace; font-size: 8px; color: var(--text-soft); margin-top: 3px; }
</style>
</head>
<body>
<!-- Radius tokens -->
<div class="row">
  <div class="box"><div class="r" style="width:48px;height:48px;border-radius:1rem;"></div><div class="label">control<br>1rem</div></div>
  <div class="box"><div class="r" style="width:56px;height:56px;border-radius:1.35rem;"></div><div class="label">panel<br>1.35rem</div></div>
  <div class="box"><div class="r" style="width:66px;height:66px;border-radius:1.7rem;"></div><div class="label">card<br>1.7rem</div></div>
  <div class="box"><div class="r" style="width:76px;height:76px;border-radius:1.95rem;"></div><div class="label">hero<br>1.95rem</div></div>
  <div class="box"><div class="r" style="width:48px;height:48px;border-radius:999px;"></div><div class="label">full<br>pill</div></div>
</div>
<div class="sep"></div>
<!-- Shadow tokens -->
<div class="shadow-row">
  <div class="shadow-box" style="box-shadow:0 18px 40px rgba(15,23,42,0.06)"><div class="shadow-name">Shadow Soft</div><div class="shadow-val">0 18px 40px rgba(15,23,42,0.06)</div></div>
  <div class="shadow-box" style="box-shadow:0 28px 68px rgba(15,23,42,0.11)"><div class="shadow-name">Shadow Strong</div><div class="shadow-val">0 28px 68px rgba(15,23,42,0.11)</div></div>
  <div class="shadow-box" style="box-shadow:0 16px 28px rgba(50,224,196,0.22)"><div class="shadow-name">Teal Glow</div><div class="shadow-val">0 16px 28px rgba(50,224,196,0.22)</div></div>
  <div class="shadow-box" style="box-shadow:0 12px 28px rgba(255,107,107,0.24)"><div class="shadow-name">Coral Glow</div><div class="shadow-val">0 12px 28px rgba(255,107,107,0.24)</div></div>
</div>
</body>
</html>
